# ============================================================================
# COMMUNICATION-SERVICE — PRODUCTION
# ============================================================================

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: communication-service

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.http.client.HttpClientAutoConfiguration
      - de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongoAutoConfiguration

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      database: ${SPRING_DATA_MONGODB_DATABASE:learning_management}
      auto-index-creation: true
      uuid-representation: standard

    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAPSERVERS}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUPID:communication-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:https://educonservicediscovery-64307221061.asia-south1.run.app/eureka}
    registry-fetch-interval-seconds: 15
    initial-instance-info-replication-interval-seconds: 10
    instance-info-replication-interval-seconds: 10
    eureka-server-connect-timeout-seconds: 10
    eureka-server-read-timeout-seconds: 10
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:educoncommunicationservice-64307221061.asia-south1.run.app}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${eureka.instance.hostname}
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
    home-page-url: https://${eureka.instance.hostname}/
    status-page-url: https://${eureka.instance.hostname}/actuator/info
    health-check-url: https://${eureka.instance.hostname}/actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 90

agora:
  api:
    app-id: ${AGORA_APP_ID}
    app-certificate: ${AGORA_APP_CERTIFICATE}
  recording:
    enabled: true
    quality: 720p
    retention-days: 30
    customer-id: ${AGORA_CUSTOMER_ID}
    customer-secret: ${AGORA_CUSTOMER_SECRET}
  storage:
    vendor: 6
    region: 8
    bucket: ${AGORA_STORAGE_BUCKET:tutoring-platform-files}
    access-key: ${GCS_ACCESS_KEY:}
    secret-key: ${GCS_SECRET_KEY:}
  rtc:
    channel-profile: LIVE_BROADCASTING
    encryption-mode: aes-128-xts
    max-idle-time: 300
  whiteboard:
    app-id: ${AGORA_WHITEBOARD_APP_ID:}
    access-key: ${AGORA_WHITEBOARD_AK:}
    secret-key: ${AGORA_WHITEBOARD_SK:}
    api-base-url: https://api.netless.link/v5
    region: ${AGORA_WHITEBOARD_REGION:sg}
    token-expiry-hours: 24

websocket:
  allowed-origins:
    - ${WEBSOCKET_ALLOWED_ORIGIN_1:https://educonnect.tconsolutions.com}
    - ${WEBSOCKET_ALLOWED_ORIGIN_2:https://uniflux.tconsolutions.com}
    - ${WEBSOCKET_ALLOWED_ORIGIN_3:http://localhost:5173}
  message-broker:
    prefix: /app
    destination-prefix: /topic
  endpoint: /ws

message:
  retention-days: 30
  max-message-length: 2000
  typing-indicator-timeout-seconds: 5

app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN_1:https://educonnect.tconsolutions.com}
      - ${CORS_ALLOWED_ORIGIN_2:https://uniflux.tconsolutions.com}
      - ${CORS_ALLOWED_ORIGIN_3:http://localhost:5173}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      redis:
        enabled: false
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.tcon.communication_service: INFO
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG
    org.springframework.web.socket: WARN
    reactor.netty.http.client: WARN
    io.netty.handler.codec.http.websocketx: WARN
    org.springframework.cloud.loadbalancer: WARN
    io.github.resilience4j: INFO
    reactor.netty: WARN
    io.netty: ERROR
    org.springframework.data.redis: WARN
  pattern:
    console: "%level [%thread] %logger{36} - %msg%n"

kafka:
  topics:
    video-session-events: ${SPRING_KAFKA_TOPICS_VIDEOSESSIONEVENTS:video-session-events}
    message-events: ${SPRING_KAFKA_TOPICS_MESSAGEEVENTS:message-events}
    class-events: ${SPRING_KAFKA_TOPICS_CLASSEVENTS:class-events}
    booking-events: ${SPRING_KAFKA_TOPICS_BOOKINGEVENTS:booking-events}